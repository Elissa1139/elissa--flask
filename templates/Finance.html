<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance</title>
  
  <style>
    body {
      font-family: "Calibri", sans-serif;
      background: linear-gradient(to top, #7cc576 40%, #a3e0ff 100%);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
    }

    .error-button {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px;
      background-color: red;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
  <style>
    body {
      font-family: "Calibri", sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .header {
      background-color: white;
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
      color: #002D5B;
    }

    .header span {
      color: #4377FF;
    }

    .container {
      margin: 20px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .button {
      padding: 15px 20px;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
    }

    .red {
      background: #D9534F;
    }

    .blue {
      background: #0275D8;
    }

    .green {
      background: #5CB85C;
    }

    .assignments {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      width: 300px;
      box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
      text-align: left;
    }

    .new-label {
      background: #28A745;
      color: white;
      padding: 5px;
      font-size: 12px;
      border-radius: 5px;
      display: inline-block;
    }

    .incomplete {
      background: #FFC107;
      color: black;
      padding: 5px;
      font-size: 12px;
      border-radius: 5px;
      display: inline-block;
    }

    .overdue {
      background: #DC3545;
      color: white;
      padding: 5px;
      font-size: 12px;
      border-radius: 5px;
      display: inline-block;
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f9f9f9] font-sans">
  <div class="flex h-screen">

    <!-- Sidebar -->
    <aside class="w-20 bg-white flex flex-col items-center py-6 space-y-6 shadow">
      <!-- Hamburger Icon -->
      <div class="bg-[#223142] p-2 rounded-md text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </div>

      <!-- Page Buttons -->
      <!-- <a href="topic.html">
        <button class="bg-blue-100 text-blue-600 font-bold rounded-md px-3 py-1">1</button>
      </a> -->
      <a href="accountopening.html">
        <button class="hover:bg-blue-50 text-blue-600 font-bold rounded-md px-3 py-1">1</button>
      </a>
      <a href="insurance.html">
        <button class="hover:bg-blue-50 text-blue-600 font-bold rounded-md px-3 py-1">2</button>
      </a>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6">
      <!-- Top Bar -->
      <div class="flex justify-between items-center mb-6">
        <div class="text-xl font-handwriting">{{today_date}}</div>
        <div class="flex items-center gap-2">
          <img src="https://emojicdn.elk.sh/🧑‍🌾" class="w-8 h-8" alt="Student Icon" />
          <span class="font-handwriting text-xl">{{student}}</span>
        </div>
      </div>

      <!-- Title -->
      <h1 class="text-2xl font-handwriting text-center mb-6">Finance</h1>

      <!-- Assignment Box -->
      <div class="max-w-xl mx-auto bg-white p-6 rounded-lg shadow-md text-center space-y-6">
        <!-- Assignment status -->
        <div class="flex items-center justify-center gap-4">
          <span class="text-lg font-semibold text-gray-600">ASSIGNMENT STATUS</span>
          <span class="bg-yellow-400 text-white font-bold px-3 py-1 rounded-md">{{completed}}</span>
        </div>

        <!-- Sharing access -->
        <div class="flex justify-center gap-4 items-center text-sm">
          <span class="text-gray-600 font-semibold">SHARING ACCESS</span>
          <div class="flex items-center gap-1 text-gray-800 font-bold">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M7 8h10M7 12h4m1 8h.01M12 3C7.58 3 4 6.58 4 11s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8z" />
            </svg>
            <a onclick="onClickEnabled()" id="sharing-access" style="cursor: pointer;">DISABLED</a>
            <script>
              function onClickEnabled() {
              const sharingAccessElement = document.getElementById('sharing-access');
              if (sharingAccessElement.textContent === 'DISABLED') {
                sharingAccessElement.textContent = 'ENABLED';
              } else {
                sharingAccessElement.textContent = 'DISABLED';
              }
              }
            </script>
          </div>
        </div>

        <!-- Enter button -->
        <a href="accountopening.html"
          class="bg-blue-600 text-white font-bold py-2 px-6 rounded-full hover:bg-blue-700 text-center inline-block">ENTER</a>
      </div>
    </main>
  </div>
</body>
</script>

</html>
